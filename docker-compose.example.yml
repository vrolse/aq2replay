# Example Docker Compose for aq2replay.
# Copy to docker-compose.yml and adjust for your environment.
# All secrets come from .env (copy .env.example → .env and fill in values).
#
# Quick start:
#   cp .env.example .env   # fill in secrets
#   docker compose up --build
#
# Nginx Proxy Manager users: replace 'ports' with 'expose' and add your
# 'networks' block (see comment below).

services:
  aq2replay:
    build: .
    container_name: aq2replay
    ports:
      - "5000:5000"
    # If using Nginx Proxy Manager, replace the ports block above with:
    #   expose:
    #     - '5000'
    #   networks:
    #     - proxiable
    env_file:
      - .env
    volumes:
      # Demo files — add new .mvd2 / .mvd2.gz without rebuilding.
      - ./mvd2:/app/mvd2:ro
      # Map files (.bsp).
      - ./bsp:/app/bsp:ro
      # WAL/PAK textures for top-view rendering (optional).
      - ./textures:/app/textures:ro
      # Quake 2 colour palette.
      - ./colormap.pcx:/app/colormap.pcx:ro
      # Player MD2 models and team skin PNGs (players/male/tris.md2 etc.).
      - ./players:/app/players:ro
      # Weapon MD2 models and skins (models/weapons/…).
      - ./models:/app/models:ro
      # Generated caches — topview SVG, MD2 JSON, BSP mesh, textures, remote assets.
      - ./cache:/app/cache
      # Stats SQLite DB on a named volume for clean lifecycle management.
      - aq2replay_db:/var/lib/aq2replay
    restart: unless-stopped

# Uncomment if using Nginx Proxy Manager:
# networks:
#   proxiable:
#     external: true

volumes:
  aq2replay_db:
